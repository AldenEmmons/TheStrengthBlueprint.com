<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TSB CRM</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #1a1a1a;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────── */
  header {
    background: #1a1a1a;
    color: #fff;
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
  .overdue-badge {
    background: #e53e3e;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    display: none;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .user-label { font-size: 13px; color: #aaa; }
  .btn {
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 14px;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: #fff; color: #1a1a1a; }
  .btn-ghost { background: transparent; color: #ccc; border: 1px solid #444; }
  .btn-danger { background: #e53e3e; color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* ── Toolbar ─────────────────────────────────────── */
  .toolbar {
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .search-input {
    flex: 1;
    max-width: 320px;
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    background: #fff;
  }
  .search-input:focus { border-color: #1a1a1a; }

  /* ── Board ───────────────────────────────────────── */
  .board {
    display: flex;
    gap: 14px;
    padding: 0 24px 24px;
    overflow-x: auto;
    align-items: flex-start;
  }

  .column {
    background: #e8eaed;
    border-radius: 10px;
    width: 240px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  .column-header {
    padding: 12px 14px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .column-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
  .column-count {
    background: #bbb;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 10px;
  }
  .column-cards {
    padding: 6px 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
  }
  .column.drag-over .column-cards {
    background: rgba(0,0,0,.05);
    border-radius: 6px;
  }

  /* ── Lead Card ───────────────────────────────────── */
  .card {
    background: #fff;
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
    transition: box-shadow .15s, transform .15s;
    user-select: none;
  }
  .card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.12); }
  .card.dragging { opacity: .5; transform: rotate(2deg); }
  .card-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .card-meta { font-size: 12px; color: #666; line-height: 1.5; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    background: #e8f0fe;
    color: #1a56db;
  }
  .tag-overdue { background: #fff5f5; color: #c53030; }
  .tag-source { background: #f0fff4; color: #276749; }

  /* ── Stage Colors ────────────────────────────────── */
  .col-New\ Lead    .column-count { background: #718096; }
  .col-Contacted    .column-count { background: #3182ce; }
  .col-Assessment\ Booked .column-count { background: #805ad5; }
  .col-Client       .column-count { background: #38a169; }
  .col-Lost         .column-count { background: #e53e3e; }

  /* ── Modal ───────────────────────────────────────── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 12px;
    width: 460px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px;
    position: relative;
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: #888;
  }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #555; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    font-family: inherit;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #1a1a1a; }
  .form-row textarea { resize: vertical; min-height: 70px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

  /* ── Detail Panel ────────────────────────────────── */
  .panel-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    z-index: 200;
  }
  .panel-overlay.open { display: block; }
  .panel {
    position: fixed;
    top: 0;
    right: -520px;
    width: 500px;
    max-width: 95vw;
    height: 100vh;
    background: #fff;
    z-index: 201;
    overflow-y: auto;
    transition: right .25s ease;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .panel.open { right: 0; }
  .panel-header { display: flex; align-items: flex-start; justify-content: space-between; }
  .panel-name { font-size: 22px; font-weight: 700; }
  .panel-close {
    background: none; border: none; font-size: 22px; cursor: pointer; color: #888; flex-shrink: 0;
  }
  .panel-stage select {
    padding: 6px 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    outline: none;
  }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .detail-field label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 2px; display: block; }
  .detail-field p { font-size: 14px; color: #1a1a1a; }
  .detail-field input, .detail-field textarea, .detail-field select {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  .detail-field input:focus, .detail-field textarea:focus { border-color: #1a1a1a; }
  .detail-field textarea { resize: vertical; min-height: 60px; }
  .save-row { display: flex; gap: 8px; }

  /* ── Notes ───────────────────────────────────────── */
  .notes-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .note-item {
    border-left: 3px solid #e0e0e0;
    padding: 8px 12px;
    margin-bottom: 10px;
    background: #fafafa;
    border-radius: 0 6px 6px 0;
  }
  .note-meta { font-size: 11px; color: #888; margin-bottom: 4px; }
  .note-content { font-size: 13px; line-height: 1.6; }
  .note-intake-title { font-size: 13px; font-weight: 700; letter-spacing: .5px; margin-bottom: 8px; color: #1a1a1a; }
  .note-section-header {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
    color: #555; background: #f0f2f5; padding: 3px 8px; margin: 12px -12px 6px;
    border-left: 3px solid #1a1a1a; display: block;
  }
  .note-field { display: block; margin-bottom: 2px; }
  .note-field-key { font-weight: 600; color: #333; }
  .note-blank { display: block; height: 4px; }
  .add-note textarea {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
    resize: vertical;
    min-height: 70px;
  }
  .add-note textarea:focus { border-color: #1a1a1a; }
  .add-note { display: flex; flex-direction: column; gap: 8px; }

  /* ── Misc ────────────────────────────────────────── */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid #ccc;
    border-top-color: #1a1a1a;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-col { font-size: 12px; color: #aaa; text-align: center; padding: 12px 0; }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    z-index: 999;
    transition: transform .25s ease;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .board { padding: 0 12px 24px; }
    .toolbar { padding: 10px 12px; }
    header { padding: 0 12px; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-left">
    <span class="logo">THE STRENGTH BLUEPRINT</span>
    <span class="overdue-badge" id="overdueBadge">0 overdue</span>
  </div>
  <div class="header-right">
    <span class="user-label"><?= userName ?></span>
    <button class="btn btn-ghost btn-sm" onclick="loadBoard()">↻ Refresh</button>
    <button class="btn btn-primary" onclick="openAddModal()">+ Add Lead</button>
  </div>
</header>

<!-- Toolbar -->
<div class="toolbar">
  <input class="search-input" type="text" id="searchInput" placeholder="Search leads…" oninput="onSearch(this.value)">
</div>

<!-- Board -->
<div class="board" id="board">
  <div style="padding:40px;color:#aaa;">Loading…</div>
</div>

<!-- Add Lead Modal -->
<div class="overlay" id="addModal">
  <div class="modal">
    <button class="modal-close" onclick="closeAddModal()">✕</button>
    <div class="modal-title">Add Lead</div>
    <div class="form-row-2">
      <div class="form-row">
        <label>First Name *</label>
        <input id="f_first" type="text" placeholder="Jane">
      </div>
      <div class="form-row">
        <label>Last Name</label>
        <input id="f_last" type="text" placeholder="Smith">
      </div>
    </div>
    <div class="form-row">
      <label>Email</label>
      <input id="f_email" type="email" placeholder="jane@email.com">
    </div>
    <div class="form-row">
      <label>Phone</label>
      <input id="f_phone" type="tel" placeholder="+1 555 000 0000">
    </div>
    <div class="form-row-2">
      <div class="form-row">
        <label>Pain Area</label>
        <input id="f_pain" type="text" placeholder="Lower back">
      </div>
      <div class="form-row">
        <label>Goal</label>
        <input id="f_goal" type="text" placeholder="Lose weight">
      </div>
    </div>
    <div class="form-row">
      <label>Source</label>
      <select id="f_source">
        <option value="Manual">Manual</option>
        <option value="Facebook">Facebook Ad</option>
        <option value="Referral">Referral</option>
        <option value="Instagram">Instagram</option>
        <option value="Website">Website</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-row">
      <label>Initial Note (optional)</label>
      <textarea id="f_note" placeholder="Any notes about this lead…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" id="addBtn" onclick="submitAddLead()">Add Lead</button>
    </div>
  </div>
</div>

<!-- Detail Panel Overlay -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>

<!-- Detail Panel -->
<div class="panel" id="detailPanel">
  <div class="panel-header">
    <div class="panel-name" id="panelName">—</div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>

  <div class="panel-stage">
    <label style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px;">Stage</label>
    <select id="panelStage" onchange="changeStage(this.value)"></select>
  </div>

  <div class="detail-grid">
    <div class="detail-field">
      <label>Email</label>
      <input type="email" id="panelEmail">
    </div>
    <div class="detail-field">
      <label>Phone</label>
      <input type="tel" id="panelPhone">
    </div>
    <div class="detail-field">
      <label>Pain Area</label>
      <input type="text" id="panelPain">
    </div>
    <div class="detail-field">
      <label>Goal</label>
      <input type="text" id="panelGoal">
    </div>
    <div class="detail-field">
      <label>Source</label>
      <input type="text" id="panelSource" readonly style="background:#fafafa;">
    </div>
    <div class="detail-field">
      <label>Next Follow-up</label>
      <input type="date" id="panelFollowup">
    </div>
  </div>
  <div class="save-row">
    <button class="btn btn-primary" onclick="saveDetails()">Save Changes</button>
    <button class="btn btn-danger btn-sm" onclick="deleteLead()">Delete</button>
  </div>

  <div class="notes-section">
    <h3>Notes & Activity</h3>
    <div id="notesList"></div>
    <div class="add-note">
      <textarea id="newNoteText" placeholder="Add a note…"></textarea>
      <div>
        <button class="btn btn-primary btn-sm" onclick="submitNote()">Add Note</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  var STAGES = ['New Lead','Contacted','Assessment Booked','Client','Lost'];
  var allLeads = [];
  var currentLeadId = null;
  var userEmail = '<?= userEmail ?>';

  // ── Bootstrap ─────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    loadBoard();
    loadOverdueBadge();
  });

  function loadBoard() {
    document.getElementById('board').innerHTML = '<div style="padding:40px;color:#aaa;">Loading…</div>';
    google.script.run
      .withSuccessHandler(function(leads) {
        allLeads = leads || [];
        renderBoard(allLeads);
      })
      .withFailureHandler(function(err) {
        document.getElementById('board').innerHTML = '<div style="padding:40px;color:#e53e3e;">Error loading leads: ' + err.message + '</div>';
      })
      .getAllLeads();
  }

  function loadOverdueBadge() {
    google.script.run
      .withSuccessHandler(function(count) {
        var badge = document.getElementById('overdueBadge');
        if (count > 0) {
          badge.textContent = count + ' overdue';
          badge.style.display = 'inline-block';
        } else {
          badge.style.display = 'none';
        }
      })
      .getOverdueCount();
  }

  // ── Render Board ───────────────────────────────────
  function renderBoard(leads) {
    var board = document.getElementById('board');
    board.innerHTML = '';

    var active = leads.filter(function(l) { return l.deleted !== 'TRUE'; });

    STAGES.forEach(function(stage) {
      var col = document.createElement('div');
      col.className = 'column col-' + stage;
      col.dataset.stage = stage;

      var stageLeads = active.filter(function(l) { return l.stage === stage; });

      col.innerHTML =
        '<div class="column-header">' +
          '<span class="column-title">' + stage + '</span>' +
          '<span class="column-count">' + stageLeads.length + '</span>' +
        '</div>' +
        '<div class="column-cards" id="col-' + stage.replace(/\s/g,'_') + '"></div>';

      board.appendChild(col);

      var cardsEl = col.querySelector('.column-cards');

      if (stageLeads.length === 0) {
        cardsEl.innerHTML = '<div class="empty-col">No leads</div>';
      } else {
        stageLeads.forEach(function(lead) {
          cardsEl.appendChild(makeCard(lead));
        });
      }

      // Drag-over events
      cardsEl.addEventListener('dragover', function(ev) {
        ev.preventDefault();
        col.classList.add('drag-over');
      });
      cardsEl.addEventListener('dragleave', function() {
        col.classList.remove('drag-over');
      });
      cardsEl.addEventListener('drop', function(ev) {
        ev.preventDefault();
        col.classList.remove('drag-over');
        var leadId = ev.dataTransfer.getData('lead_id');
        if (leadId) dropLead(leadId, stage);
      });
    });
  }

  function makeCard(lead) {
    var card = document.createElement('div');
    card.className = 'card';
    card.draggable = true;
    card.dataset.leadId = lead.lead_id;

    var isOverdue = isLeadOverdue(lead);
    var name = (lead.first_name || '') + ' ' + (lead.last_name || '');
    var tags = '';
    if (isOverdue) tags += '<span class="tag tag-overdue">Overdue</span>';
    if (lead.source && lead.source !== 'Manual') tags += '<span class="tag tag-source">' + lead.source + '</span>';
    if (lead.pain_area) tags += '<span class="tag">' + lead.pain_area + '</span>';

    card.innerHTML =
      '<div class="card-name">' + escHtml(name.trim() || 'Unknown') + '</div>' +
      '<div class="card-meta">' +
        (lead.email ? escHtml(lead.email) + '<br>' : '') +
        (lead.phone ? escHtml(lead.phone) : '') +
      '</div>' +
      (tags ? '<div class="card-tags">' + tags + '</div>' : '');

    card.addEventListener('click', function() { openPanel(lead.lead_id); });

    card.addEventListener('dragstart', function(ev) {
      card.classList.add('dragging');
      ev.dataTransfer.setData('lead_id', lead.lead_id);
    });
    card.addEventListener('dragend', function() {
      card.classList.remove('dragging');
    });

    return card;
  }

  function isLeadOverdue(lead) {
    if (!lead.next_followup || lead.reminder_sent === 'TRUE') return false;
    var d = new Date(lead.next_followup);
    if (isNaN(d.getTime())) return false;
    var today = new Date();
    today.setHours(0,0,0,0);
    return d < today;
  }

  // ── Search ─────────────────────────────────────────
  function onSearch(q) {
    if (!q.trim()) { renderBoard(allLeads); return; }
    var lq = q.toLowerCase();
    var filtered = allLeads.filter(function(l) {
      return [l.first_name, l.last_name, l.email, l.phone].some(function(v) {
        return v && v.toLowerCase().indexOf(lq) >= 0;
      });
    });
    renderBoard(filtered);
  }

  // ── Drag & Drop Stage Change ───────────────────────
  function dropLead(leadId, newStage) {
    var lead = allLeads.find(function(l) { return l.lead_id === leadId; });
    if (!lead || lead.stage === newStage) return;
    lead.stage = newStage;
    renderBoard(allLeads);
    google.script.run
      .withSuccessHandler(function(updated) {
        // update local copy
        var idx = allLeads.findIndex(function(l) { return l.lead_id === leadId; });
        if (idx >= 0) allLeads[idx] = updated;
        showToast('Moved to ' + newStage);
      })
      .withFailureHandler(function(err) {
        showToast('Error: ' + err.message);
        loadBoard();
      })
      .updateLeadStage(leadId, newStage);
  }

  // ── Add Lead Modal ─────────────────────────────────
  function openAddModal() {
    ['f_first','f_last','f_email','f_phone','f_pain','f_goal','f_note'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
    document.getElementById('f_source').value = 'Manual';
    document.getElementById('addModal').classList.add('open');
    document.getElementById('f_first').focus();
  }
  function closeAddModal() {
    document.getElementById('addModal').classList.remove('open');
  }
  function submitAddLead() {
    var firstName = document.getElementById('f_first').value.trim();
    if (!firstName) { alert('First name is required.'); return; }

    var btn = document.getElementById('addBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Adding…';

    var data = {
      first_name:  firstName,
      last_name:   document.getElementById('f_last').value.trim(),
      email:       document.getElementById('f_email').value.trim(),
      phone:       document.getElementById('f_phone').value.trim(),
      pain_area:   document.getElementById('f_pain').value.trim(),
      goal:        document.getElementById('f_goal').value.trim(),
      source:      document.getElementById('f_source').value,
      first_note:  document.getElementById('f_note').value.trim(),
      assigned_to: userEmail
    };

    google.script.run
      .withSuccessHandler(function(lead) {
        allLeads.push(lead);
        renderBoard(allLeads);
        closeAddModal();
        showToast('Lead added!');
        btn.disabled = false;
        btn.textContent = 'Add Lead';
      })
      .withFailureHandler(function(err) {
        alert('Error: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Add Lead';
      })
      .createLead(data);
  }

  // ── Detail Panel ───────────────────────────────────
  function openPanel(leadId) {
    var lead = allLeads.find(function(l) { return l.lead_id === leadId; });
    if (!lead) return;
    currentLeadId = leadId;

    var name = ((lead.first_name || '') + ' ' + (lead.last_name || '')).trim() || 'Unknown';
    document.getElementById('panelName').textContent = name;

    // Stage selector
    var stageEl = document.getElementById('panelStage');
    stageEl.innerHTML = STAGES.map(function(s) {
      return '<option value="' + s + '"' + (lead.stage === s ? ' selected' : '') + '>' + s + '</option>';
    }).join('');

    document.getElementById('panelEmail').value    = lead.email || '';
    document.getElementById('panelPhone').value    = lead.phone || '';
    document.getElementById('panelPain').value     = lead.pain_area || '';
    document.getElementById('panelGoal').value     = lead.goal || '';
    document.getElementById('panelSource').value   = lead.source || '';
    document.getElementById('panelFollowup').value = formatDateInput(lead.next_followup);

    document.getElementById('notesList').innerHTML = '<div style="color:#aaa;font-size:12px;">Loading notes…</div>';
    document.getElementById('newNoteText').value = '';

    document.getElementById('panelOverlay').classList.add('open');
    document.getElementById('detailPanel').classList.add('open');

    google.script.run
      .withSuccessHandler(function(notes) { renderNotes(notes); })
      .withFailureHandler(function() {
        document.getElementById('notesList').innerHTML = '<div style="color:#e53e3e;font-size:12px;">Could not load notes.</div>';
      })
      .getNotesForLead(leadId);
  }

  function closePanel() {
    document.getElementById('panelOverlay').classList.remove('open');
    document.getElementById('detailPanel').classList.remove('open');
    currentLeadId = null;
  }

  function changeStage(newStage) {
    if (!currentLeadId) return;
    dropLead(currentLeadId, newStage);
  }

  function saveDetails() {
    if (!currentLeadId) return;
    var updates = {
      email:         document.getElementById('panelEmail').value.trim(),
      phone:         document.getElementById('panelPhone').value.trim(),
      pain_area:     document.getElementById('panelPain').value.trim(),
      goal:          document.getElementById('panelGoal').value.trim(),
      next_followup: document.getElementById('panelFollowup').value,
      updated_by:    userEmail
    };
    google.script.run
      .withSuccessHandler(function(updated) {
        var idx = allLeads.findIndex(function(l) { return l.lead_id === currentLeadId; });
        if (idx >= 0) allLeads[idx] = updated;
        renderBoard(allLeads);
        showToast('Saved!');
      })
      .withFailureHandler(function(err) { showToast('Error: ' + err.message); })
      .updateLead(currentLeadId, updates);
  }

  function deleteLead() {
    if (!currentLeadId) return;
    if (!confirm('Delete this lead? This cannot be undone.')) return;
    var id = currentLeadId;
    closePanel();
    google.script.run
      .withSuccessHandler(function() {
        allLeads = allLeads.filter(function(l) { return l.lead_id !== id; });
        renderBoard(allLeads);
        showToast('Lead deleted.');
      })
      .withFailureHandler(function(err) { showToast('Error: ' + err.message); })
      .deleteLead(id);
  }

  // ── Notes ──────────────────────────────────────────
  function renderNotes(notes) {
    var el = document.getElementById('notesList');
    if (!notes || notes.length === 0) {
      el.innerHTML = '<div style="color:#aaa;font-size:12px;margin-bottom:12px;">No notes yet.</div>';
      return;
    }
    el.innerHTML = notes.map(function(n) {
      var d = n.created_at ? new Date(n.created_at).toLocaleString() : '';
      return '<div class="note-item">' +
        '<div class="note-meta">' + escHtml(n.type || 'Note') + ' · ' + escHtml(d) + ' · ' + escHtml(n.created_by || '') + '</div>' +
        '<div class="note-content">' + formatNoteContent(n.content || '') + '</div>' +
        '</div>';
    }).join('');
  }

  function submitNote() {
    if (!currentLeadId) return;
    var text = document.getElementById('newNoteText').value.trim();
    if (!text) return;
    google.script.run
      .withSuccessHandler(function(note) {
        document.getElementById('newNoteText').value = '';
        google.script.run
          .withSuccessHandler(renderNotes)
          .getNotesForLead(currentLeadId);
        showToast('Note added!');
      })
      .withFailureHandler(function(err) { showToast('Error: ' + err.message); })
      .createNote(currentLeadId, 'Note', text, userEmail);
  }

  // ── Helpers ────────────────────────────────────────
  function formatNoteContent(raw) {
    var lines = raw.split('\n');
    var html = '';
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (line === 'CLIENT INTAKE FORM') {
        html += '<span class="note-intake-title">' + escHtml(line) + '</span>';
      } else if (/^\[.+\]$/.test(line)) {
        html += '<span class="note-section-header">' + escHtml(line.slice(1, -1)) + '</span>';
      } else if (line === '') {
        html += '<span class="note-blank"></span>';
      } else {
        var colon = line.indexOf(': ');
        if (colon > 0) {
          html += '<span class="note-field"><span class="note-field-key">' +
            escHtml(line.slice(0, colon + 1)) + '</span> ' +
            escHtml(line.slice(colon + 2)) + '</span>';
        } else {
          html += '<span class="note-field">' + escHtml(line) + '</span>';
        }
      }
    }
    return html;
  }

  function escHtml(s) {
    return String(s || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function formatDateInput(val) {
    if (!val) return '';
    var d = new Date(val);
    if (isNaN(d.getTime())) return '';
    return d.toISOString().substring(0,10);
  }

  var toastTimer;
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
  }
</script>
</body>
</html>
