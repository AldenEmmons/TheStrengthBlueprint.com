<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied — TSB CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080c14;
      color: #f4f1ec;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 48px 32px;
      max-width: 480px;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 3px;
      margin-bottom: 48px;
    }
    .logo span { color: #c9a84c; }
    .icon {
      width: 64px;
      height: 64px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: #c9a84c;
      margin-bottom: 12px;
    }
    p {
      color: #8a9ab0;
      font-size: 15px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">THE STRENGTH <span>BLUEPRINT</span></div>
    <div class="icon">🔒</div>
    <h1>Access Denied</h1>
    <p>Your Google account is not authorized to access the TSB CRM. Contact Alden or Luke to be added to the authorized list.</p>
  </div>
</body>
</html>
